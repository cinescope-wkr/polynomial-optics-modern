site_name: Polynomial Optics (Modernized)
repo_name: cinescope-wkr/polynomial-optics-modern
repo_url: https://github.com/cinescope-wkr/polynomial-optics-modern

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
      - Overview: guide/overview.md
      - Build: guide/build.md
      - Structure: guide/structure.md
      - Math model + optics: guide/math-model.md
  - Examples:
      - ex0-basicarithmetic: examples/ex0-basicarithmetic.md
      - ex1-postprocess: examples/ex1-postprocess.md
      - ex2-eclipsed-bokeh: examples/ex2-eclipsed-bokeh.md
  - Tools:
      - exr-sanity: tools/exr-sanity.md
  - Experiments:
      - Sanity sweeps: experiments/sanity.md
  - Reference:
      - Lens format: reference/lens-format.md
      - Troubleshooting: reference/troubleshooting.md
      - Citation & licensing: reference/citation.md
      - Hosting: hosting.md
      - Upstream README: upstream.md
      - Docs index: documentation.md
